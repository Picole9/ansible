- name: check docker is active
  service:
    name: docker
    state: started
    enabled: true
- name: ensure group "docker"
  become: true
  ansible.builtin.group:
    name: docker
    state: present
- name: adding user to docker group
  become: true
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
