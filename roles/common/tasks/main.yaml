- import_tasks: debian.yaml
  when: ansible_os_family == "Debian"

- import_tasks: arch.yaml
  when: ansible_os_family == "Archlinux"

- name: install font
  block:
    - name: download font
      unarchive:
        src: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hasklig.zip
        dest: "/home/{{ user }}/.local/share/fonts"
        remote_src: yes
      environment:
        http_proxy: "{{ proxy }}"
        https_proxy: "{{ proxy }}"
    - name: update font-cache
      shell: "fc-cache -f"
