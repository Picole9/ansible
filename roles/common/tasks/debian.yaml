- name: install apt packages
  become: true
  apt:
    update_cache: yes
    name:
      - bat # cat
      - eza # ls
      - ripgrep # grep
      - fd-find # find
      - btop # htop
      - universal-ctags
      - ca-certificates
      - curl
      - git
      - gnupg
      - npm
      - tar
      - python3-pip
      - python3-venv
- name: install pip-packages
  ansible.builtin.pip:
    name:
      - tldr
  environment:
    http_proxy: "{{ http_proxy }}"
    https_proxy: "{{ https_proxy }}"
    PIP_BREAK_SYSTEM_PACKAGES: 1
